# Lint and analyzer settings for vvk_ui_kit.
# Enables package_api_docs and treats missing public API docs as info-level hints.
include: package:flutter_lints/flutter.yaml

linter:
  rules:
    - package_api_docs
    - comment_references
    - avoid_print
    - prefer_const_constructors
    - prefer_const_literals_to_create_immutables

analyzer:
  exclude:
    - "build/**"
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  errors:
    public_member_api_docs: info
